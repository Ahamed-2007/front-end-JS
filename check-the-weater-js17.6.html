<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Check</title>
</head>
<body style="background-color:#DAF7A6 ; font-family:Arial; padding:20px; text-align:center;">
  <h1>Weather Check whether it's rainy⛈ or sunny☀</h1>
  <input id="city" placeholder="Enter city">
  <button id="checkWeather">Check Weather</button>

  <p id="msg"></p>

  <script>
    document.getElementById("checkWeather").addEventListener("click", function(){
      var city = document.getElementById("city").value.trim();

      if (city === '') {
        document.getElementById("msg").innerHTML = "Please enter a city.";
        return;
      }

      // Simulating API call with setTimeout
      document.getElementById("msg").innerHTML = "Fetching data...";
      setTimeout(function(){
        // Simulated API response
        var response = {
          city: city,
          season: "Summer",
          weather: Math.random() < 0.5 ? "Sunny" : "Rainy"
        };

        if (response.weather === "Sunny") {
          document.getElementById("msg").innerHTML = 
            "Great weather! Perfect for a trip to " + response.city + " during " + response.season + ".";
        } else {
          document.getElementById("msg").innerHTML = 
            "Bad weather! Better to stay home in " + response.city + " during " + response.season + ".";
        }
      }, 1000);
    });
  </script>

</body>
</html>
